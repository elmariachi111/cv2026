<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stefan Adolf · CV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
/* Stefan Adolf — Terminal CV
   Subtle, deep-black hacker aesthetic. Minimal effects. */

:root {
  --bg: #0a0a0a;
  --bg-elev: #0e0e10;
  --bg-panel: #111114;
  --line: #1c1c20;
  --line-strong: #26262b;
  --fg: #d6d6d2;
  --fg-dim: #8a8a86;
  --fg-mute: #56565a;
  --accent: #7dffaf;        /* phosphor green, muted */
  --accent-dim: #4a8c66;
  --amber: #d4a655;
  --magenta: #c46a9c;
  --cursor: var(--accent);
  --font-mono: 'JetBrains Mono', 'Share Tech Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --font-display: 'JetBrains Mono', ui-monospace, monospace;
  --font-vt: 'VT323', 'Share Tech Mono', monospace;
  --radius: 2px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  scroll-behavior: smooth;
}

::selection { background: var(--accent); color: var(--bg); }

a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color .15s ease, color .15s ease;
}
a:hover { border-bottom-color: var(--accent-dim); }

/* Page shell */
.cv {
  max-width: 1180px;
  margin: 0 auto;
  padding: 32px 28px 96px;
}

/* Top bar (window chrome) */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border: 1px solid var(--line);
  border-bottom: none;
  background: var(--bg-elev);
  font-size: 12px;
  color: var(--fg-dim);
}
.topbar .dots { display:flex; gap: 6px; margin-right: 8px; }
.topbar .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #2a2a2e; border: 1px solid #1a1a1e;
}
.topbar .dot.a { background:#3a2a2a; }
.topbar .dot.b { background:#3a3a2a; }
.topbar .dot.c { background:#2a3a2a; }
.topbar .path { color: var(--fg-dim); }
.topbar .spacer { flex: 1; }
.topbar .meta { color: var(--fg-mute); }

/* Sections */
section {
  border: 1px solid var(--line);
  background: var(--bg-elev);
  margin-top: -1px;
}
section + section { margin-top: -1px; }

.sec-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-panel);
  color: var(--fg-dim);
  font-size: 13px;
  letter-spacing: 0.04em;
}
.sec-head .marker { color: var(--accent); }
.sec-head .title { color: var(--fg); text-transform: lowercase; }
.sec-head .hint { margin-left: auto; color: var(--fg-mute); font-size: 12px; }

/* HERO */
.hero { padding: 36px 28px 28px; display:grid; grid-template-columns: 1fr 320px; gap: 36px; align-items: start; }
@media (max-width: 900px) { .hero { grid-template-columns: 1fr; } }

.neofetch .portrait {
  width: 100%;
  height: 160px;
  border: 1px solid var(--line-strong);
  background: var(--bg);
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
}
.neofetch .portrait::before {
  content: 'portrait.jpg';
  position: absolute;
  top: 5px; left: 7px;
  font-size: 10px;
  color: var(--fg-mute);
  z-index: 2;
  letter-spacing: 0.08em;
  pointer-events: none;
}
.neofetch .portrait image-slot {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.hero .prompt {
  color: var(--accent);
  font-size: 13px;
  margin-bottom: 18px;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}
.hero .prompt .who { color: var(--amber); }
.hero .prompt .host { color: var(--magenta); }
.hero .prompt .cmd { color: var(--fg); }
.cursor::after {
  content: '▊';
  color: var(--cursor);
  margin-left: 6px;
  animation: blink 1.1s steps(2,end) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(34px, 6.5vw, 64px);
  line-height: 1.02;
  font-weight: 600;
  margin: 0 0 14px;
  letter-spacing: -0.02em;
  color: var(--fg);
}
.hero h1 .accent { color: var(--accent); }
.hero h1 .sub {
  color: var(--fg-dim);
  font-weight: 400;
  font-size: 0.4em;
  letter-spacing: 0.04em;
  display: inline-block;
  margin-top: 8px;
}

.hero .tagline {
  font-size: 16px;
  color: var(--fg-dim);
  max-width: 640px;
  margin: 0 0 24px;
  line-height: 1.6;
}

.hero .roles {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 22px;
}
.role-tag {
  border: 1px solid var(--line-strong);
  padding: 6px 10px;
  font-size: 12px;
  color: var(--fg-dim);
  background: var(--bg);
}
.role-tag .pre { color: var(--accent); margin-right: 6px; }

/* neofetch panel */
.neofetch {
  border: 1px solid var(--line);
  background: var(--bg);
  padding: 18px 20px;
  font-size: 12.5px;
  line-height: 1.5;
  color: var(--fg-dim);
}
.neofetch .row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 3px 0;
}
.neofetch .k {
  color: var(--accent);
  width: 64px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.neofetch .v {
  color: var(--fg);
  flex: 1;
  min-width: 0;
  word-break: break-word;
}
.neofetch .ascii {
  white-space: pre;
  color: var(--accent-dim);
  font-size: 11px;
  line-height: 1.1;
  margin-bottom: 12px;
  opacity: .85;
}
.neofetch hr {
  border: 0; border-top: 1px solid var(--line);
  margin: 10px 0;
}

/* now strip */
.now-strip { padding: 18px 28px; display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
.now-strip .live {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--fg-dim);
}
.now-strip .live .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
.now-strip .lbl { color: var(--fg-mute); margin-right: 6px; }
.now-strip a.proj { color: var(--fg); border-bottom: 1px dashed var(--line-strong); }
.now-strip a.proj:hover { color: var(--accent); border-bottom-color: var(--accent-dim); }

/* SKILLS */
.skills { padding: 28px; }
.skills-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}
@media (max-width: 900px) { .skills-grid { grid-template-columns: 1fr; } }

.skill-cat {
  background: var(--bg-elev);
  padding: 20px 22px;
}
.skill-cat .cat-head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 14px;
}
.skill-cat .cat-id { color: var(--fg-mute); font-size: 11px; letter-spacing: 0.08em; }
.skill-cat h3 {
  margin: 0;
  font-size: 14px;
  color: var(--fg);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.skill-cat .cat-accent { width: 18px; height: 1px; background: var(--accent); align-self: center; margin-right: 4px; }

.skill-list { display: flex; flex-direction: column; gap: 6px; }
.skill-row {
  display: grid; grid-template-columns: 1fr auto;
  align-items: center; gap: 12px;
  font-size: 13px;
}
.skill-row .name { color: var(--fg); }
.skill-row .bar {
  display: inline-flex; gap: 2px; align-items: center;
}
.skill-row .seg {
  width: 8px; height: 6px;
  background: var(--line-strong);
}
.skill-row .seg.on { background: var(--accent); }
.skill-row .yrs { color: var(--fg-mute); font-size: 11px; width: 36px; text-align: right; }

/* HISTORY */
.history { padding: 0; }
.history-row {
  display: grid;
  grid-template-columns: 200px 1fr 280px;
  gap: 28px;
  padding: 28px 28px;
  border-top: 1px solid var(--line);
  align-items: start;
}
.history-row:first-child { border-top: none; }
@media (max-width: 1000px) {
  .history-row { grid-template-columns: 140px 1fr; }
  .history-row .screen { grid-column: 1 / -1; }
}
@media (max-width: 640px) {
  .history-row { grid-template-columns: 1fr; gap: 16px; }
}

.history-row .when {
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.04em;
}
.history-row .when .yr {
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
  display: block;
  margin-bottom: 2px;
}
.history-row .when .dur { color: var(--fg-mute); }

.history-row .company {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}
.history-row .logo {
  width: 36px; height: 36px;
  border: 1px solid var(--line-strong);
  background: var(--bg);
  display: grid; place-items: center;
  color: var(--accent);
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}
.history-row .name {
  font-size: 18px;
  color: var(--fg);
  font-weight: 600;
}
.history-row .role { font-size: 13px; color: var(--fg-dim); margin-bottom: 12px; }
.history-row .desc {
  font-size: 13px; line-height: 1.65;
  color: var(--fg-dim);
  max-width: 640px;
}
.history-row .desc strong { color: var(--fg); font-weight: 500; }
.history-row .desc a { color: var(--accent); }

.history-row .tech {
  margin-top: 14px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.history-row .tech .t {
  font-size: 11px;
  color: var(--fg-dim);
  border: 1px solid var(--line-strong);
  padding: 3px 7px;
  background: var(--bg);
  letter-spacing: 0.04em;
}

.screen {
  border: 1px solid var(--line-strong);
  background: var(--bg);
  position: relative;
  aspect-ratio: 16 / 10;
  overflow: hidden;
}
.screen .scr-bar {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 9px;
  border-bottom: 1px solid var(--line);
  font-size: 10px; color: var(--fg-mute);
  background: var(--bg-elev);
}
.screen .scr-bar .d {
  width: 6px; height: 6px; border-radius: 50%; background: #2a2a2e;
}
.screen .scr-body {
  position: absolute; inset: 26px 0 0 0;
  display: grid; place-items: center;
  background:
    repeating-linear-gradient(45deg,
      transparent 0, transparent 8px,
      rgba(125,255,175,0.025) 8px, rgba(125,255,175,0.025) 9px);
  color: var(--fg-mute);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-align: center;
  padding: 16px;
}
.screen .scr-body .label {
  border: 1px dashed var(--line-strong);
  padding: 8px 12px;
  color: var(--fg-dim);
}

/* QUALIFICATIONS */
.quals { padding: 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
@media (max-width: 800px) { .quals { grid-template-columns: 1fr; } }

.qual-block h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--fg-mute);
  margin: 0 0 14px;
  font-weight: 500;
}
.qual-block ul { margin: 0; padding: 0; list-style: none; }
.qual-block li {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 14px;
  padding: 10px 0;
  border-top: 1px dashed var(--line);
  font-size: 13px;
}
.qual-block li:first-child { border-top: none; }
.qual-block li .yr { color: var(--accent); font-size: 12px; }
.qual-block li .it .ttl { color: var(--fg); font-weight: 500; }
.qual-block li .it .where { color: var(--fg-dim); font-size: 12px; }

/* CONTACT */
.contact { padding: 28px; }
.contact-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}
@media (max-width: 800px) { .contact-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .contact-grid { grid-template-columns: 1fr; } }

.c-cell {
  background: var(--bg-elev);
  padding: 16px 18px;
  display: flex; flex-direction: column; gap: 4px;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: background .15s ease;
}
.c-cell:hover { background: var(--bg-panel); border-bottom-color: transparent; }
.c-cell .k { font-size: 10px; letter-spacing: 0.14em; color: var(--fg-mute); }
.c-cell .v { font-size: 14px; color: var(--fg); word-break: break-all; }
.c-cell:hover .v { color: var(--accent); }

/* Footer */
.foot {
  padding: 24px 28px;
  border-top: 1px solid var(--line);
  color: var(--fg-mute);
  font-size: 11px;
  display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.foot .left { letter-spacing: 0.08em; }
.foot .right { color: var(--fg-mute); }

/* subtle scanline overlay (intensity tweakable) */
.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background-image: repeating-linear-gradient(
    0deg, transparent 0, transparent 2px,
    rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 3px
  );
  opacity: var(--scan-opacity, 0.6);
  mix-blend-mode: overlay;
}
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 99;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
}

/* utility */
.mono { font-family: var(--font-mono); }
.dim { color: var(--fg-dim); }
.mute { color: var(--fg-mute); }
.acc { color: var(--accent); }
.amb { color: var(--amber); }
.kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  border: 1px solid var(--line-strong);
  padding: 1px 5px;
  background: var(--bg);
  color: var(--fg-dim);
}

/* scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line-strong); }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
</style>
</head>

<div id="root"></div>

<script>
/**
 * <image-slot> — user-fillable image placeholder.
 * Drop an image onto the slot to fill it; it persists via a sidecar JSON file.
 */
(() => {
  const STATE_FILE = '.image-slots.state.json';
  const MAX_DIM = 1200;
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  const subs = new Set();
  let slots = {};
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    if (loaded) save(); else load().then(save);
  }

  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';

      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');

      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };

      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {

      this.removeEventListener('dragover', this);

      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');

        e.stopPropagation();

        if (f) this._ingest(f);

    async _ingest(file) {

      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;

      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,

      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      if (url) {
        if (this._img.getAttribute('src') !== url) {

          this._ghost.src = url;

        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();

        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">
/* global React, CV */
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#7dffaf",
  "scanlines": 0.6,
  "showVignette": true,
  "showAscii": true,
  "density": "comfy"
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = ['#7dffaf', '#d4a655', '#9bbcff', '#c46a9c', '#e5e5e2'];

function useClock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}

function pad(n) { return String(n).padStart(2, '0'); }

function uptimeFrom(year) {
  const start = new Date(year, 0, 1);
  const diff = Date.now() - start.getTime();
  const yrs = diff / (1000 * 60 * 60 * 24 * 365.25);
  return yrs.toFixed(2);
}

const BIRTH_YEAR = 1978;
function ageNow() {
  return Math.floor(uptimeFrom(BIRTH_YEAR));
}

function TopBar() {
  const t = useClock();
  const stamp = `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())} ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  return (
    <div className="topbar">
      <div className="dots">
        <span className="dot a"></span>
        <span className="dot b"></span>
        <span className="dot c"></span>
      </div>
      <span className="path">~ / cv / stefan-adolf.txt</span>
      <span className="spacer"></span>
      <span className="meta">tmux · zsh · {stamp}</span>
    </div>
  );
}

function Hero() {
  const t = useClock();
  const time = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  return (
    <section className="hero-sec">
      <div className="hero">
        <div>
          <div className="prompt">
            <span className="who">{CV.handle}</span><span className="dim">@</span><span className="host">berlin</span><span className="dim">:~$</span>
            <span className="cmd cursor"> whoami</span>
          </div>

          <h1>
            <span>{CV.name}</span>
            <br/>
            <span className="sub">// software engineer</span>
          </h1>

          <p className="tagline">{CV.blurb}</p>

          <div className="roles">
            {CV.roles.map((r) => (
              <span className="role-tag" key={r}>
                <span className="pre">─</span>{r}
              </span>
            ))}
          </div>
        </div>

        <aside className="neofetch">
          <div className="portrait">
            <image-slot id="cv-portrait" placeholder="drop photo" shape="rect"></image-slot>
          </div>
          <Row k="user"   v={CV.handle} />
          <Row k="host"   v="berlin.de" />
          <Row k="role"   v="principal eng." />
          <Row k="shell"  v="zsh + tmux" />
          <hr/>
          <Row k="age"    v={`${ageNow()}y`} />
          <Row k="born"   v={`${BIRTH_YEAR}.01 · DE`} />
          <Row k="uptime" v={`${uptimeFrom(1998)} yrs coding`} />
          <Row k="status" v={<span className="acc">available</span>} />
          <Row k="clock"  v={time} />
        </aside>
      </div>
    </section>
  );
}

function Row({ k, v }) {
  return (
    <div className="row">
      <span className="k">{k}</span>
      <span className="v">{v}</span>
    </div>
  );
}

function NowStrip() {
  return (
    <div className="now-strip" style={{ borderTop: '1px solid var(--line)' }}>
      <span className="live">
        <span className="pulse"></span>
        currently shipping
      </span>
      <span className="lbl mute">·</span>
      {CV.now.map((p, i) => (
        <React.Fragment key={p.name}>
          <a className="proj" href={p.href} target="_blank" rel="noreferrer">
            <span className="dim">{p.role.toLowerCase()} </span>
            <span className="acc">→ {p.name}</span>
          </a>
          {i < CV.now.length - 1 && <span className="mute">·</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

function Skills() {
  return (
    <section>
      <SecHead marker="//" title="skills.matrix" hint="proficiency × years" />
      <div className="skills">
        <div className="skills-grid">
          {CV.skills.map(cat => (
            <div className="skill-cat" key={cat.id}>
              <div className="cat-head">
                <span className="cat-accent"></span>
                <span className="cat-id">{cat.id}</span>
                <h3>{cat.title}</h3>
              </div>
              <div className="skill-list">
                {cat.items.map(it => (
                  <div className="skill-row" key={it.name}>
                    <span className="name">{it.name}</span>
                    <span className="bar">
                      {Array.from({length:5}).map((_,i) => (
                        <span key={i} className={`seg ${i < it.level ? 'on' : ''}`}></span>
                      ))}
                      <span className="yrs">{it.yrs}y</span>
                    </span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function History() {
  return (
    <section>
      <SecHead marker="//" title="history.log" hint={`${CV.history.length} entries · descending`} />
      <div className="history">
        {CV.history.map((h, i) => (
          <HistoryRow key={i} h={h} idx={i} />
        ))}
      </div>
    </section>
  );
}

function HistoryRow({ h, idx }) {
  return (
    <div className="history-row">
      <div className="when">
        <span className="yr">{h.from} → {h.to}</span>
        <span className="dur">{h.dur}</span>
      </div>
      <div>
        <div className="company">
          <div className="logo">{h.logo}</div>
          <div>
            <div className="name">{h.company}</div>
            <div className="role">{h.role}</div>
          </div>
        </div>
        <p className="desc">{h.desc}</p>
        <div className="tech">
          {h.tech.map(t => <span key={t} className="t">{t}</span>)}
        </div>
      </div>
      <div className="screen">
        <div className="scr-bar">
          <span className="d"></span><span className="d"></span><span className="d"></span>
          <span style={{marginLeft:6}}>{h.company.toLowerCase().replace(/\s+/g,'-')}.png</span>
        </div>
        <div className="scr-body">
          <span className="label">{h.label}</span>
        </div>
      </div>
    </div>
  );
}

function Qualifications() {
  return (
    <section>
      <SecHead marker="//" title="qualifications.txt" hint="education · talks · awards" />
      <div className="quals">
        <div className="qual-block">
          <h4>// education & recognition</h4>
          <ul>
            {CV.education.map((e, i) => (
              <li key={i}>
                <span className="yr">{e.yr}</span>
                <span className="it">
                  <div className="ttl">{e.ttl}</div>
                  <div className="where">{e.where}</div>
                </span>
              </li>
            ))}
          </ul>
        </div>
        <div className="qual-block">
          <h4>// speaking & community</h4>
          <ul>
            {CV.speaking.map((e, i) => (
              <li key={i}>
                <span className="yr">{e.yr}</span>
                <span className="it">
                  <div className="ttl">{e.ttl}</div>
                  <div className="where">{e.where}</div>
                </span>
              </li>
            ))}
          </ul>
        </div>
      </div>
    </section>
  );
}

function Contact() {
  return (
    <section>
      <SecHead marker="//" title="contact.sock" hint="open a connection" />
      <div className="contact">
        <div className="contact-grid">
          {CV.contacts.map(c => (
            <a className="c-cell" key={c.k} href={c.href} target="_blank" rel="noreferrer">
              <span className="k">{c.k}</span>
              <span className="v">{c.v}</span>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

function Foot() {
  const t = useClock();
  return (
    <div className="foot">
      <span className="left">$ exit 0 · session length {(uptimeFrom(1998))}y · born {BIRTH_YEAR}</span>
      <span className="right">© 2026 · {CV.handle} · the struggle is real</span>
    </div>
  );
}

function SecHead({ marker, title, hint }) {
  return (
    <div className="sec-head">
      <span className="marker">{marker}</span>
      <span className="title">{title}</span>
      <span className="hint">{hint}</span>
    </div>
  );
}

function Tweaks({ t, setTweak }) {
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Accent">
        <TweakColor value={t.accent} options={ACCENT_OPTIONS} onChange={v => setTweak('accent', v)} />
      </TweakSection>
      <TweakSection title="Effects">
        <TweakSlider label="Scanline opacity" min={0} max={1} step={0.05} value={t.scanlines} onChange={v => setTweak('scanlines', v)} />
        <TweakToggle label="Vignette" value={t.showVignette} onChange={v => setTweak('showVignette', v)} />
      </TweakSection>
      <TweakSection title="Layout">
        <TweakRadio
          label="Density"
          value={t.density}
          options={[{value:'tight',label:'Tight'},{value:'comfy',label:'Comfy'}]}
          onChange={v => setTweak('density', v)}
        />
      </TweakSection>
    </TweaksPanel>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--scan-opacity', t.scanlines);
    document.documentElement.style.setProperty('--accent-dim', t.accent + '99');
    window.__tweaks = t;
  }, [t.accent, t.scanlines, t.showAscii]);

  const padScale = t.density === 'tight' ? '0.78' : '1';
  return (
    <>
      {t.scanlines > 0 && <div className="scanlines" style={{opacity: t.scanlines * 0.6}}></div>}
      {t.showVignette && <div className="vignette"></div>}
      <div className="cv" style={{ '--pad-scale': padScale }}>
        <TopBar />
        <Hero />
        <NowStrip />
        <Skills />
        <History />
        <Qualifications />
        <Contact />
        <Foot />
      </div>
      <Tweaks t={t} setTweak={setTweak} />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
